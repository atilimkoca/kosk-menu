<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KÖŞK Alsancak - Menü</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #5a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .menu-page {
            width: 100%;
            max-width: 600px;
            display: block;
        }

        .menu-page img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ===== POPUP ===== */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .popup-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .popup-content {
            position: relative;
            max-width: 500px;
            width: 100%;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .popup-overlay.hidden .popup-content {
            transform: scale(0.9);
        }

        .popup-content img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }

        .popup-close {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 36px;
            height: 36px;
            background: #fff;
            color: #5a0a0a;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            line-height: 1;
            transition: transform 0.2s;
        }

        .popup-close:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <!-- POPUP -->
    <div class="popup-overlay" id="popup">
        <div class="popup-content">
            <button class="popup-close" id="popupClose" aria-label="Kapat">&times;</button>
            <img src="images/Çalışma Yüzeyi 3.png" alt="Köşk Fırsatları">
        </div>
    </div>

    <!-- MENU PAGES -->
    <div class="menu-page"><img src="images/1.jpeg" alt="Köşk Alsancak"></div>
    <div class="menu-page"><img src="images/Çalışma Yüzeyi 3.png" alt="Köşk Fırsatları"></div>
    <div class="menu-page"><img src="images/2.jpeg" alt="Paylaş & Pizza"></div>
    <div class="menu-page"><img src="images/3.jpeg" alt="Burger, Bar Atıştırmalıkları, Tavadan, Salata"></div>
    <div class="menu-page"><img src="images/4.jpeg" alt="Köşk Perfections"></div>
    <div class="menu-page"><img src="images/5.jpeg" alt="Classic Kokteyl"></div>
    <div class="menu-page"><img src="images/bira.png" alt="Bira"></div>
    <div class="menu-page"><img src="images/shot.png" alt="Shot"></div>
    <div class="menu-page"><img src="images/8.jpeg" alt="Şarap"></div>
    <div class="menu-page"><img src="images/9.jpeg" alt="Soft"></div>
    <div class="menu-page"><img src="images/viski.png" alt="Viski"></div>
    <div class="menu-page"><img src="images/strongest.png" alt="Strongest"></div>
    <div class="menu-page"><img src="images/12.jpeg" alt="Şişe"></div>

    <script>
        const popup = document.getElementById('popup');
        const popupClose = document.getElementById('popupClose');

        popupClose.addEventListener('click', () => {
            popup.classList.add('hidden');
        });

        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                popup.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
